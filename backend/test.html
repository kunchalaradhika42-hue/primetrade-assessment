<!DOCTYPE html>
<html>
<head>
  <title>API Test</title>
</head>

<body>

<h2>Register</h2>

<input id="name" placeholder="name"><br><br>
<input id="email" placeholder="email"><br><br>
<input id="password" placeholder="password"><br><br>

<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>

<input id="loginEmail" placeholder="email"><br><br>
<input id="loginPassword" placeholder="password"><br><br>

<button onclick="login()">Login</button>

<script>

let token = "";

/* ================= REGISTER ================= */
async function register() {
  try {
    const res = await fetch("http://localhost:5000/api/v1/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();
    console.log(data);
    alert("Register: " + JSON.stringify(data));

  } catch (err) {
    console.log(err);
    alert("Register failed");
  }
}

/* ================= LOGIN ================= */
async function login() {
  try {
    const res = await fetch("http://localhost:5000/api/v1/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: document.getElementById("loginEmail").value,
        password: document.getElementById("loginPassword").value
      })
    });

    const data = await res.json();
    console.log(data);

    if (data.token) {
      token = data.token;
      alert("Login success!\nToken saved in console");
      console.log("JWT TOKEN:", token);
    } else {
      alert("Login failed: " + JSON.stringify(data));
    }

  } catch (err) {
    console.log(err);
    alert("Login error");
  }
}

</script>

</body>
</html>
